<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature Ludo: Reefs & Rainforests</title>
    <meta name="description" content="Um jogo de Ludo temático sobre a proteção de recifes e florestas tropicais.">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Nature Ludo</h1>
        <p>Unidos pela Proteção dos Recifes e Florestas</p>
      </header>

      <main class="game-container">
        <div id="ludo-board" class="ludo-board">
          <div class="center-hub">
            <img src="/board_center.png" alt="Hub da Natureza" class="center-img" />
          </div>
          
          <div class="base forest" id="base-0">
            <div class="token-slot" data-index="0"></div>
            <div class="token-slot" data-index="1"></div>
            <div class="token-slot" data-index="2"></div>
            <div class="token-slot" data-index="3"></div>
          </div>
          <div class="base reef" id="base-1">
            <div class="token-slot" data-index="0"></div>
            <div class="token-slot" data-index="1"></div>
            <div class="token-slot" data-index="2"></div>
            <div class="token-slot" data-index="3"></div>
          </div>
          <div class="base solar" id="base-2">
            <div class="token-slot" data-index="0"></div>
            <div class="token-slot" data-index="1"></div>
            <div class="token-slot" data-index="2"></div>
            <div class="token-slot" data-index="3"></div>
          </div>
          <div class="base wildlife" id="base-3">
            <div class="token-slot" data-index="0"></div>
            <div class="token-slot" data-index="1"></div>
            <div class="token-slot" data-index="2"></div>
            <div class="token-slot" data-index="3"></div>
          </div>
        </div>

        <aside class="dashboard">
          <div class="player-info">
            <h2 id="current-player-name">Vez de: <span class="name">Jaguar</span></h2>
            <div class="dice-container" id="dice-btn">
              <img src="/dice.png" alt="Dado da Natureza" id="dice-img" />
              <div id="dice-value">?</div>
            </div>
          </div>
          
          <div class="game-log" id="game-log">
            <p>Bem-vindo ao Nature Ludo! Role o dado para começar a salvar as espécies.</p>
          </div>

          <button id="reset-btn" class="btn-primary">Reiniciar Partida</button>
        </aside>
      </main>

      <footer>
        <p>&copy; 2026 All in for Nature - Proteja o que você ama.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
